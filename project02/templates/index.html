<!DOCTYPE html>
<html>
<body>
    <h2>Difference Between Two Dates</h2>
    <form method="POST" action="/">
        Enter First Date:
        <br><br>
        <input type="date" name="date1">
        <br><br>
        Enter Second Date:
        <br><br>
        <input type="date" name="date2">
        <br><br>
        <button type="submit">Calculate Difference</button>
    </form>
    {% if diff %}
    <h3>Difference is {{diff}} days</h3>
    {% endif %}
</body>

</html>
